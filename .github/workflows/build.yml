name: build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - posts/**
      - src/**

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies and build
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: true

      - name: Push
        uses: s0/git-publish-subdir-action@develop
        env:
          REPO: self
          BRANCH: gh-pages
          FOLDER: dist
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
